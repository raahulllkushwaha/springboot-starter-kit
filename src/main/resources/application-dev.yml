spring:
  datasource:
    url: jdbc:h2:mem:starterkit;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    url: jdbc:h2:mem:starterkit;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    user: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    com.starterkit: DEBUG
    org.springframework.security: DEBUG

app:
  jwt:
    secret: dGVzdC1zZWNyZXQta2V5LWZvci1kZXYtb25seS1ub3QtZm9yLXByb2R1Y3Rpb24=
  admin:
    email: admin@example.com
