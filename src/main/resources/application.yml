spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: springboot-starter-kit

  jpa:
    hibernate:

    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true


  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    default-property-inclusion: non_null


# JWT
app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry: ${JWT_ACCESS_EXPIRY:900000}       # 15 min
    refresh-token-expiry: ${JWT_REFRESH_EXPIRY:604800000}  # 7 days

  # Rate Limiting
  rate-limit:
    enabled: true
    capacity: 20          # max requests in window
    refill-tokens: 20     # tokens refilled per window
    refill-seconds: 60    # window duration (seconds)

  # CORS
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
    max-age: 3600

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

logging:
  level:
    root: INFO
    com.starterkit: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{requestId}] %logger{36} - %msg%n"
