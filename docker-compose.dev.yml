version: '3.9'

# Dev override — runs only MySQL; app runs locally via mvn spring-boot:run
services:
  mysql:
    image: mysql:8.0
    container_name: starterkit-mysql-dev
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DEV_ROOT_PASSWORD:root}
      MYSQL_DATABASE: starterkit_dev
      MYSQL_USER: dev
      MYSQL_PASSWORD: dev
    volumes:
      - mysql_dev_data:/var/lib/mysql

volumes:
  mysql_dev_data:
